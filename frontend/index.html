<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ball Radar · Sydney Basketball Court Radar</title>

    <!-- SEO -->
    <meta
      name="description"
      content="Find and rate Sydney basketball courts. Real photos, reviews, tags and a live 'courts near me' map — so you never show up to a locked gate again."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="/" />

    <!-- Social preview. Set og:url and og:image to absolute URLs once deployed. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Ball Radar" />
    <meta property="og:title" content="Ball Radar · Sydney Basketball Court Radar" />
    <meta
      property="og:description"
      content="Find and rate Sydney basketball courts. Real photos, reviews, tags and a live 'courts near me' map."
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ball Radar · Sydney Basketball Court Radar" />
    <meta
      name="twitter:description"
      content="Find and rate Sydney basketball courts. Real photos, reviews, tags and a live 'courts near me' map."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // apply saved theme before React mounts to avoid a flash
      document.documentElement.setAttribute(
        'data-theme', localStorage.getItem('ballradar_theme') || 'day'
      );
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
