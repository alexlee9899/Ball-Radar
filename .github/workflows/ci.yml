name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend · typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    # PostGIS-enabled Postgres so the geospatial "nearby" path is exercised in CI.
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ballradar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d ballradar_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # When DATABASE_URL is set, the test harness uses it instead of spinning up
      # an embedded Postgres — so CI runs against real PostGIS.
      DATABASE_URL: postgres://test:test@localhost:5432/ballradar_test
      JWT_SECRET: ci-secret
      EMAIL_MODE: dev

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  frontend:
    name: Frontend · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_GOOGLE_MAPS_API_KEY: ci-placeholder
      VITE_API_BASE_URL: https://api.example.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
